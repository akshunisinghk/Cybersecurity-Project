server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # SPA fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}