# name: CI / CD
name: Dev CI/CD Pipeline

on:
    push:
        branches: ["main"]

env:
    IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/llm

jobs:
    docker-build-push:
        name: Build, Scan & Push Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Get Short SHA
              id: vars
              run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

            # Build once, locally, so we can scan before anything is pushed
            - name: Build and Export to Docker (local, for scanning)
              uses: docker/build-push-action@v5
              with:
                  context: .
                  load: true
                  tags: ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Run Trivy Vulnerability Scanner
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: "${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}"
                  format: "table"
                  exit-code: "1"
                  ignore-unfixed: true
                  vuln-type: "os,library"
                  severity: "CRITICAL,HIGH"

            # Optional: also emit a SARIF report and upload it to the Security tab,
            # so failed scans are still visible in GitHub even though the job stops.
            - name: Run Trivy (SARIF report)
              if: always()
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: "${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}"
                  format: "sarif"
                  output: "trivy-results.sarif"
                  ignore-unfixed: true
                  vuln-type: "os,library"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy scan results to GitHub Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: "trivy-results.sarif"

            # Only reached if the scan step above passed (exit-code: 1 stops the job otherwise)
            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  # short-sha (immutable history), dev-short-sha (readable history), dev (floating tag for CD)
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
                      ${{ env.IMAGE_NAME }}:dev-${{ env.SHORT_SHA }}
                      ${{ env.IMAGE_NAME }}:dev
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Summary
              run: |
                  echo "### Image pushed :rocket:" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ env.IMAGE_NAME }}:dev-${{ env.SHORT_SHA }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ env.IMAGE_NAME }}:dev\`" >> $GITHUB_STEP_SUMMARY
